<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Agent Client</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }
    
    #root {
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Preact from CDN -->
  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.3';
    import { useState, useEffect } from 'https://esm.sh/preact@10.19.3/hooks';
    
    window.React = {
      h,
      render,
      createElement: h,
      useState,
      useEffect
    };
    console.log('[PreactSetup] Loaded from esm.sh');
  </script>
  
  <!-- Plugin Manager -->
  <script src="../plugins/PluginManager.js"></script>
  <script src="../plugins/examples/HelloWorldPlugin.js"></script>
  
  <!-- Side Panel App -->
  <script src="sidepanel.jsx"></script>
</body>
</html>
