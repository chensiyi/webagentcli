<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }
    
    #root {
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Preact -->
  <script src="../vendor/preact.min.js"></script>
  <script src="../vendor/preact-hooks.umd.js"></script>
  <script>
    // 暴露 Preact 到 window
    if (typeof self !== 'undefined' && self.preact) {
      window.React = {
        ...self.preact,
        useState: self.preactHooks?.useState || function() {},
        useEffect: self.preactHooks?.useEffect || function() {},
        createElement: self.preact.h
      };
      console.log('[SidePanel] Preact loaded');
    } else {
      console.error('[SidePanel] Failed to load Preact');
    }
  </script>
  
  <!-- Side Panel App -->
  <script src="sidepanel.jsx"></script>
</body>
</html>
