name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Update version in script
      run: |
        sed -i "s/@version.*/@version      ${{ steps.get_version.outputs.VERSION }}/" agent.user.js
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release v${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        body: |
          ## OpenRouter Free AI Agent v${{ steps.get_version.outputs.VERSION }}
          
          ### ✨ 更新内容
          - 自动构建发布
          
          ### 📦 安装
          直接下载 `agent.user.js` 并安装到 Tampermonkey
      
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./agent.user.js
        asset_name: agent.user.js
        asset_content_type: application/javascript
