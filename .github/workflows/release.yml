name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Update version in script
      run: |
        # 从 tag 获取版本号 (去掉 v 前缀)
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "Updating version to: $VERSION"
        
        # 使用 sed 更新 @version
        if [[ "$OSTYPE" == "darwin"* ]]; then
          # macOS
          sed -i '' "s/@version.*/@version      $VERSION/" agent.user.js
        else
          # Linux
          sed -i "s/@version.*/@version      $VERSION/" agent.user.js
        fi
        
        # 验证更新
        echo "Updated version line:"
        grep "@version" agent.user.js
    
    - name: Build script
      run: |
        # 安装 Node.js (如果需要)
        if ! command -v node &> /dev/null; then
          echo "Node.js not found, using system default"
        fi
        
        # 运行构建 (如果 build.js 存在)
        if [ -f build.js ]; then
          echo "Running build..."
          node build.js || echo "Build failed, using existing agent.user.js"
          
          # 如果构建成功,复制 dist 文件到根目录
          if [ -f dist/agent.user.js ]; then
            cp dist/agent.user.js agent.user.js
            echo "Using built version from dist/"
          fi
        else
          echo "No build.js found, using existing agent.user.js"
        fi
        
        # 显示文件大小
        ls -lh agent.user.js
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release v${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        body: |
          ## OpenRouter Free AI Agent v${{ steps.get_version.outputs.VERSION }}
          
          ### ✨ 更新内容
          - 自动构建发布
          
          ### 📦 安装
          直接下载 `agent.user.js` 并安装到 Tampermonkey
      
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./agent.user.js
        asset_name: agent.user.js
        asset_content_type: application/javascript
