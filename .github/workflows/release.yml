name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build script
      run: |
        # 运行构建
        echo "Running build..."
        node build.js
        
        # 验证构建产物
        if [ -f dist/agent.user.js ]; then
          echo "Build successful!"
          ls -lh dist/agent.user.js
        else
          echo "Build failed: dist/agent.user.js not found"
          exit 1
        fi
    
    - name: Create Release
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        
        # 创建 release body
        cat > RELEASE_BODY.md << EOF
        ## Free Web AI Agent v$VERSION
        
        ### ✨ 更新内容
        - 自动构建发布
        
        ### 📦 安装
        直接下载 agent.user.js 并安装到 Tampermonkey
        EOF
        
        # 使用 GitHub CLI 创建 release 并上传文件
        gh release create "v$VERSION" \
          ./dist/agent.user.js \
          --title "Release v$VERSION" \
          --notes-file RELEASE_BODY.md \
          --draft=false \
          --prerelease=false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
