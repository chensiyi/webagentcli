name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build script
      run: |
        # 运行构建
        echo "Running build..."
        node build.js
        
        # 验证构建产物
        if [ -f dist/agent.user.js ]; then
          echo "Build successful!"
          ls -lh dist/agent.user.js
        else
          echo "Build failed: dist/agent.user.js not found"
          exit 1
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Free Web AI Agent v${{ steps.get_version.outputs.VERSION }}
          
          ### ✨ 更新内容
          查看 [RELEASE_${{ steps.get_version.outputs.VERSION }}.md](https://github.com/${{ github.repository }}/blob/main/RELEASE_${{ steps.get_version.outputs.VERSION }}.md)
          
          ### 📦 安装
          直接下载 `agent.user.js` 并安装到 Tampermonkey
          
          ### 🔗 链接
          - [架构文档](https://github.com/${{ github.repository }}/blob/main/ARCHITECTURE.md)
          - [更新计划](https://github.com/${{ github.repository }}/blob/main/UPDATE_PLAN.md)
        files: |
          dist/agent.user.js
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
