name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Web Agent Client v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Web Agent Client v${{ steps.get_version.outputs.VERSION }}
          
          ### 📦 安装
          
          1. 下载 Source code (zip)
          2. 解压文件
          3. Chrome 浏览器打开 `chrome://extensions/`
          4. 开启“开发者模式”
          5. 点击“加载已解压的扩展程序”
          6. 选择解压后的文件夹
          7. 启用用户脚本支持（可选）
          
          ### ✨ 主要更新
          
          详见 GitHub Releases 自动生成的更新日志
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
