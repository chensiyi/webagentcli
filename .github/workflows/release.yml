name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build script
      run: |
        # 运行构建
        echo "Running build..."
        node build.js
        
        # 验证构建产物
        if [ -f dist/agent.user.js ]; then
          echo "Build successful!"
          ls -lh dist/agent.user.js
        else
          echo "Build failed: dist/agent.user.js not found"
          exit 1
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        body: |
          ## OpenRouter Free AI Agent v${{ steps.get_version.outputs.VERSION }}
          
          ### ✨ 更新内容
          - 自动构建发布
          
          ### 📦 安装
          直接下载 `agent.user.js` 并安装到 Tampermonkey
        files: |
          ./dist/agent.user.js
