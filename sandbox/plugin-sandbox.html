<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Plugin Sandbox</title>
</head>
<body>
  <script>
    // 沙盒环境 - 用于动态加载和执行插件代码
    console.log('[PluginSandbox] Initialized');
    
    // 监听来自 extension_pages 的消息
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'EVALUATE_PLUGIN') {
        try {
          const { code, requestId } = event.data;
          
          // 执行插件代码
          const result = evaluatePluginCode(code);
          
          // 返回结果
          event.source.postMessage({
            type: 'PLUGIN_EVALUATED',
            requestId,
            success: true,
            result: 'Plugin class evaluated successfully'
          }, event.origin);
          
        } catch (error) {
          event.source.postMessage({
            type: 'PLUGIN_EVALUATED',
            requestId: event.data.requestId,
            success: false,
            error: error.message
          }, event.origin);
        }
      }
    });
    
    function evaluatePluginCode(code) {
      // 从代码中提取类名
      const classMatch = code.match(/class\s+(\w+)\s+extends\s+/);
      const className = classMatch ? classMatch[1] : null;
      
      if (!className) {
        throw new Error('Invalid plugin code: cannot find class declaration');
      }
      
      // 在沙盒中执行
      const wrappedCode = `
        (function() {
          ${code}
          return ${className};
        })()
      `;
      
      return eval(wrappedCode);
    }
  </script>
</body>
</html>
